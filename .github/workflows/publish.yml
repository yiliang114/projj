name: Publish npm package

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

concurrency:
  group: publish-${{ github.event.pull_request.merge_commit_sha || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Git source
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

    - name: Use Node.js 20
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Install dependencies
      run: npm install --no-package-lock

    - name: Run verification
      run: npm run lint && npm run test-local
      env:
        HTTP_PROXY: ''
        HTTPS_PROXY: ''
        ALL_PROXY: ''
        NO_PROXY: ''

    - name: Read package metadata
      id: package
      run: |
        echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
        echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Check npm version existence
      id: exists
      run: |
        if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "Package version already exists on npm, skipping publish."
        else
          echo "published=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish to npm
      if: steps.exists.outputs.published == 'false'
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
